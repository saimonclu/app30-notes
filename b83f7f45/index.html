<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Слова силы — колода Макарова</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,500;1,600&family=Caveat:wght@600;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#F6EFE3;--cream2:#FBF6EB;--ink:#2E2620;--soft:#6b5f4e;--hint:#a5977e;
--brass:#B08D42;--brass2:#C9A962;--green:#4A6B57;--line:#D9CDB8;
--disp:'Cormorant Garamond',Georgia,serif;--ui:'PT Sans',system-ui,sans-serif;--hand:'Caveat',cursive}
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(120% 80% at 50% 0%, var(--cream2) 0%, var(--cream) 55%, #EFE5D2 100%) fixed;
 color:var(--ink);font-family:var(--disp);min-height:100vh}
.wrap{max-width:520px;margin:0 auto;padding:34px 22px 70px;text-align:center}
.kick{font-family:var(--ui);font-weight:700;font-size:12.5px;letter-spacing:.3em;color:var(--green);text-transform:uppercase}
h1{font-weight:700;font-size:clamp(38px,10vw,52px);line-height:1.05;margin:14px 0 8px}
h1 em{font-style:italic;color:var(--brass)}
.sub{font-size:16.5px;color:var(--soft);line-height:1.55;max-width:380px;margin:0 auto}
.r{opacity:0;transform:translateY(14px);animation:rise .7s cubic-bezier(.16,1,.3,1) forwards}
@keyframes rise{to{opacity:1;transform:none}}
.d1{animation-delay:.05s}.d2{animation-delay:.15s}.d3{animation-delay:.3s}.d4{animation-delay:.5s}

/* сцена с картой */
.scene{perspective:1400px;margin:34px auto 0;width:min(320px,82vw);aspect-ratio:5/7}
.card{position:relative;width:100%;height:100%;transform-style:preserve-3d;cursor:pointer;
 transition:transform 1.1s cubic-bezier(.2,.9,.25,1)}
.card.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;
 box-shadow:0 18px 44px rgba(90,70,35,.28)}
/* рубашка */
.back{background:radial-gradient(circle at 32% 26%, #C9A962 0%, var(--brass) 55%, #8a6c2e 100%);
 display:flex;align-items:center;justify-content:center}
.back::before{content:"";position:absolute;inset:10px;border:1.5px solid rgba(255,253,247,.5);border-radius:14px}
.back::after{content:"";position:absolute;inset:17px;border:1px solid rgba(255,253,247,.28);border-radius:11px}
.back .m{font-family:var(--disp);font-weight:700;font-size:64px;color:#FFFDF7;text-shadow:0 2px 12px rgba(90,60,10,.4)}
.back .tip{position:absolute;bottom:26px;left:0;right:0;font-family:var(--ui);font-size:12px;letter-spacing:.22em;
 color:rgba(255,253,247,.85);text-transform:uppercase}
/* лицо */
.front{transform:rotateY(180deg);background:linear-gradient(160deg,#FFFDF7 0%,var(--cream2) 100%);
 display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 22px}
.front::before{content:"";position:absolute;inset:10px;border:1px solid var(--brass);border-radius:14px;opacity:.55}
.front .num{font-family:var(--ui);font-size:11.5px;letter-spacing:.26em;color:var(--hint);text-transform:uppercase}
.front .word{font-family:var(--disp);font-style:italic;font-weight:600;font-size:clamp(21px,5.8vw,26px);
 line-height:1.42;margin:18px 6px;color:#3d352b}
.front .sig{font-family:var(--hand);font-weight:700;font-size:24px;color:var(--brass);transform:rotate(-3deg)}
.btn{display:inline-block;border:1.5px solid var(--brass);background:var(--brass);color:#fff;font-family:var(--ui);
 font-weight:700;font-size:15.5px;letter-spacing:.05em;border-radius:999px;padding:14px 34px;cursor:pointer;
 transition:transform .35s cubic-bezier(.16,1,.3,1),box-shadow .35s;margin-top:30px}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(176,141,66,.35)}
.btn.ghost{background:transparent;color:var(--brass)}
.hintline{font-family:var(--ui);font-size:13px;color:var(--hint);margin-top:16px}
.counter{font-family:var(--ui);font-size:12.5px;letter-spacing:.14em;color:var(--hint);margin-top:26px;text-transform:uppercase}
footer{margin-top:40px;font-family:var(--ui);font-size:11.5px;letter-spacing:.18em;color:var(--hint)}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001s !important;transition-duration:.001s !important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="kick r d1">колода Макарова</div>
  <h1 class="r d2">СЛОВА <em>СИЛЫ</em></h1>
  <p class="sub r d3">52 карты. Одна — твоя на сегодня. Переверни её, когда захочешь услышать.</p>

  <div class="scene r d4">
    <div class="card" id="card" onclick="flip()">
      <div class="face back"><span class="m">М</span><span class="tip">нажми — переверни</span></div>
      <div class="face front">
        <span class="num" id="cnum">карта дня</span>
        <span class="word" id="cword"></span>
        <span class="sig">Макаров</span>
      </div>
    </div>
  </div>

  <div>
    <button class="btn ghost" id="againBtn" style="display:none" onclick="drawFree()">вытянуть ещё одну</button>
  </div>
  <div class="hintline" id="hint">Карта дня одна на день — как слово, сказанное вовремя.</div>
  <div class="counter" id="counter"></div>
  <footer>СЛОВА СИЛЫ · @makarov.x1</footer>
</div>

<script>
const WORDS = [
"Перемены — это дни, в которые ты не бросаешь себя.",
"Маленький шаг сегодня сильнее большого плана на завтра.",
"Ты не опаздываешь. У твоей жизни свой темп.",
"Усталость — не слабость. Устают те, кто везёт.",
"Начни с себя — остальное подтянется.",
"Сравнивай себя только с собой из вчера.",
"Грусть — это уважение к себе прошлому.",
"Пустота — это не дыра. Это свободное место.",
"«Не получилось» значит «теперь знаю, как не работает».",
"Спешка ворует радость.",
"Порядок вокруг наводит порядок внутри.",
"Сон — не роскошь, а фундамент.",
"Каждое «да» через силу — это «нет» самому себе.",
"Мечта — это план, у которого пока нет первого шага.",
"Смелость — это шаг за руку со страхом.",
"Своя дорога не бывает ошибкой.",
"Радость не надо заслуживать.",
"Благодарность — это оптика: видишь хорошее — его становится больше.",
"Люди любят тебя не за опору, а за тебя.",
"Плохой день — не плохая жизнь.",
"Система сильнее настроения.",
"Написанное сбывается чаще.",
"Слово, сказанное себе с добром, лечит.",
"Имеешь право не только помогать — но и жить.",
"Чистый лист — это не забыть. Это перестать оглядываться.",
"Прошлое не решает за тебя, пока ты не разрешишь.",
"Возраст — это стаж жизни, а не срок годности.",
"Пока ты дышишь — ты в игре.",
"Одиночество заканчивается там, где начинается разговор.",
"Не жди понедельника. Сегодня тоже подходит.",
"Идеальный план — это «с понедельника». Живой — с помарками.",
"Сначала вода, окно и три вдоха. Потом — мир.",
"Тепло, которым делишься, не убывает.",
"Тот, кто идёт медленно, тоже идёт.",
"Не сдаваться — это тоже талант. Твой.",
"Характер — это то, что остаётся, когда сил уже нет.",
"Твоё сердце умнее твоих страхов.",
"Дом любят не за ремонт, а за тепло.",
"Скажи «нет» спокойно — и мир не рухнет.",
"Позади сто процентов твоих трудных дней. Статистика за тебя.",
"Лучший момент был вчера. Второй лучший — сейчас.",
"Корни глубже, чем кажется. Ты выстоишь.",
"Улыбка себе в зеркале — тоже практика.",
"Большое делается тихо и каждый день.",
"Не бойся начинать с малого. Бойся не начинать.",
"Люди рядом — это среда. Выбирай тех, после кого светло.",
"Ошибка — это информация, а не приговор.",
"Ты — не то, что случилось. Ты — твой следующий выбор.",
"Забота о себе — не эгоизм. Это ремонт опоры.",
"Всё большое начинается со слова «попробую».",
"Сегодняшний вечер — хорошее время простить себя.",
"Продолжай. Просто продолжай."
];
const KEY = "slova_sily_v1";
let st = JSON.parse(localStorage.getItem(KEY) || "{}");
st.drawn = st.drawn || 0;
const save = () => localStorage.setItem(KEY, JSON.stringify(st));

function dayIndex(){
  const d = new Date();
  const start = new Date(d.getFullYear(), 0, 0);
  const doy = Math.floor((d - start) / 86400000);
  return (doy * 31 + d.getFullYear() * 7) % WORDS.length;
}
let flipped = false, freeMode = false;

function setWord(i, label){
  document.getElementById("cword").textContent = WORDS[i];
  document.getElementById("cnum").textContent = label + " · " + (i+1) + " из 52";
}
function flip(){
  const c = document.getElementById("card");
  if(!flipped){
    if(!freeMode) setWord(dayIndex(), "карта дня");
    c.classList.add("flipped"); flipped = true;
    st.drawn++; const today = new Date().toDateString();
    if(st.lastDay !== today){ st.days = (st.days||0) + 1; st.lastDay = today; }
    save(); refresh();
    document.getElementById("againBtn").style.display = "inline-block";
    document.getElementById("hint").textContent = "Возвращайся к этому слову в течение дня.";
  } else {
    c.classList.remove("flipped"); flipped = false;
  }
}
function drawFree(){
  freeMode = true;
  const c = document.getElementById("card");
  c.classList.remove("flipped"); flipped = false;
  setTimeout(() => {
    let i;
    do { i = Math.floor(Math.random() * WORDS.length); } while (WORDS[i] === document.getElementById("cword").textContent);
    setWord(i, "свободная карта");
    c.classList.add("flipped"); flipped = true;
    st.drawn++; save(); refresh();
  }, 620);
}
function refresh(){
  const n = st.days || 0;
  document.getElementById("counter").textContent = n > 0 ? ("дней с колодой: " + n) : "";
}
refresh();
</script>
</body>
</html>
